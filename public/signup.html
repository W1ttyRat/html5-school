    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />

    <link rel="stylesheet" href="src/signup.css">
</head>

<body>
    <header>
        <nav class="navbar navbar-expand-lg" id="home">

                <div class="d-inline-block w-auto mt-1 pt-1 ms-5">

                        <img src="assets/tlu_h200.png" alt="brand logo" id="brand-logo"

                    </a>
                </div>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                    data-bs-target="#navbarNavDropdown" aria-controls="navbarNavDropdown" aria-expanded="false"
                    aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse mt-1" id="navbarNavDropdown">
                    <ul class="nav navbar-nav justify-content-center w-75">
                        <li class="nav-item">
                            <a class="nav-link fw-bold" href="index.html">Pealeht</a>
                        </li>
                        <li class="nav-item">

                    </ul>
                    <div class="d-flex gap-2">
                        <a href="login.html" class="btn btn-primary text-muted fw-bold">
                            <i class="fas fa-sign-in-alt me-2"></i>Logi sisse
                        </a>
                        <a href="signup.html" class="btn btn-outline-success active fw-bold" aria-current="page">
                            <i class="fas fa-user-plus me-2"></i>Registreeru
                        </a>
                    </div>
                </div>
            </div>
        </nav>
    </header>

    <main class="py-5">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-md-6">
                    <div class="card shadow-lg border-0">
                        <div class="card-body p-5">
                            <h2 class="card-title text-center fw-bold mb-4">Registreeru</h2>

                            <form id="signupForm">
                                <!-- First Name -->
                                <div class="mb-3">
                                    <label for="firstName" class="form-label">Eesnimi</label>
                                    <input type="text" class="form-control" id="firstName" placeholder="Sisesta eesnimi"
                                        required />
                                </div>

                                <!-- Last Name -->
                                <div class="mb-3">
                                    <label for="lastName" class="form-label">Perekonnanimi</label>
                                    <input type="text" class="form-control" id="lastName"
                                        placeholder="Sisesta perekonnanimi" required />
                                </div>

                                <!-- Email -->
                                <div class="mb-3">
                                    <label for="email" class="form-label">E-posti aadress</label>
                                    <input type="email" class="form-control" id="email" placeholder="Sisesta e-post"
                                        required />
                                </div>

                                <!-- Password -->
                                <div class="mb-3">
                                    <label for="password" class="form-label">Parool</label>
                                    <input type="password" class="form-control" id="password"
                                        placeholder="Sisesta parool" required />
                                </div>

                                <!-- Confirm Password -->
                                <div class="mb-3">
                                    <label for="confirmPassword" class="form-label">Kinnita parool</label>
                                    <input type="password" class="form-control" id="confirmPassword"
                                        placeholder="Kinnita parool" required />
                                </div>

                                <!-- Checkbox -->
                                <div class="form-check mb-4">
                                    <input class="form-check-input" type="checkbox" id="terms" required />
                                    <label class="form-check-label" for="terms">
                                        Nõustun tingimuste ja reeglitega
                                    </label>
                                </div>

                                <!-- Submit Button -->
                                <button type="submit" class="btn btn-primary w-100 mb-3">
                                    Registreeru
                                </button>
                            </form>

                            <!-- Login Link -->
                            <div class="text-center">
                                <p>Juba registreeritud? <a href="login.html"
                                        class="text-primary text-decoration-none">Logi sisse</a></p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer>
        <!-- place footer here -->
    </footer>

    <script src="js/signup-submit.js"></script>

    <!-- Bootstrap JavaScript Libraries -->

        crossorigin="anonymous"></script>
</body>
